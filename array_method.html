<!DOCTYPE html>
<html>
<head>
<title>Array Method</title>
</head>

<body>

<script>

var data = ["a", "b", "c"];

document.write("Jumlah data: " + data.length + "<br>");

data.push("d");

document.write("Setelah push: " + data + "<br>");

data.pop();

document.write("Setelah pop: " + data);

</script>

</body>
</html>
