<!DOCTYPE html>
<html>
<head>
<title>Percabangan Javascript</title>
</head>

<body>

<script>

var gelar;
var pendidikan = "S2";

if (pendidikan === "S1") {
  gelar = "Sarjana";
} 
else if (pendidikan === "S2") {
  gelar = "Master";
} 
else if (pendidikan === "S3") {
  gelar = "Doktor";
} 
else {
  gelar = "Tidak diketahui";
}

document.write("Gelar: " + gelar);

</script>

</body>
</html>
