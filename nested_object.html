<!DOCTYPE html>
<html>
<head>
<title>Nested Object</title>
</head>

<body>

<script>

var jadwal = {
  platform: 34,
  telah_berangkat: false,
  asal: {
      kode_kota: "MDN",
      nama_kota: "Medan",
      waktu: "2013-12-29 14:00"
  },
  tujuan: {
      kode_kota: "JKT",
      nama_kota: "Jakarta",
      waktu: "2013-12-29 17:30"
  }
};

document.write("Asal Kota: " + jadwal.asal.nama_kota + "<br>");
document.write("Tujuan Kota: " + jadwal.tujuan.nama_kota);

</script>

</body>
</html>
