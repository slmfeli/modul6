<!DOCTYPE html>
<html>
<head>
<title>Array Javascript</title>
</head>

<body>

<h2>Contoh Array</h2>

<script>

var data = ["satu", 2, true];

document.write(data[0] + "<br>");
document.write(data[1] + "<br>");
document.write(data[2] + "<br>");

var arr2 = [["satu", "dua"], ["tiga", "empat"]];

document.write(arr2[0][1] + "<br>");

</script>

</body>
</html>
